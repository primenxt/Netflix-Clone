<!DOCTYPE html>
<html>
<head>
    <title>Email Verification</title>
    <style>
        body{
            font-family:Arial,sans-serif;
            background:#141414;
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .box{
            background:#222;
            padding:30px;
            border-radius:10px;
            width:350px;
            text-align:center;
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:none;
            border-radius:5px;
        }

        button{
            width:100%;
            padding:12px;
            background:#e50914;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        #verifySection{
            display:none;
        }
    </style>
</head>
<body>

<div class="box">

    <h2>Email Verification</h2>

    <div id="emailSection">
        <input type="email" id="email" placeholder="Enter Gmail Address">
        <button onclick="sendCode()">Send Code</button>
    </div>

    <div id="verifySection">
        <input type="text" id="otp" placeholder="Enter Verification Code">
        <button onclick="verifyCode()">Verify</button>
    </div>

    <p id="message"></p>

</div>

<script>
let generatedCode;

function sendCode() {
    const email = document.getElementById("email").value;

    if (!email.endsWith("@gmail.com")) {
        alert("Please enter a valid Gmail address");
        return;
    }

    generatedCode = Math.floor(100000 + Math.random() * 900000);

    alert(
      "Demo Mode\\nVerification Code: " + generatedCode
    );

    document.getElementById("verifySection").style.display = "block";
    document.getElementById("message").innerText =
      "Verification code generated.";
}

function verifyCode() {
    const entered = document.getElementById("otp").value;

    if (entered == generatedCode) {
        document.getElementById("message").innerHTML =
          "✅ Email Verified Successfully!";
    } else {
        document.getElementById("message").innerHTML =
          "❌ Invalid Code";
    }
}
</script>

</body>
</html>
